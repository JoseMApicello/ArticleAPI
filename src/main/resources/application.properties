# ── Datasource ───────────────────────────────────────────────────────────────
# Local:      jdbc:postgresql://localhost:9090/article_db
# Cloud Run:  jdbc:postgresql:///article_db?cloudSqlInstance=PROJECT:REGION:INSTANCE&socketFactory=com.google.cloud.sql.postgres.SocketFactory
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:9090/article_db}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Connection pool (Cloud Run: keep connections low) ────────────────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

spring.sql.init.platform=postgresql

# ── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
